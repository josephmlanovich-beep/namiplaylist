<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --nami-blue: #005eb8;
      --nami-light-blue: #00a3e0;
      --nami-green: #7ac143;
      --dark: #07111f;
      --muted: #cbd5e1;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,163,224,.45), transparent 35%),
        radial-gradient(circle at bottom right, rgba(122,193,67,.35), transparent 35%),
        linear-gradient(160deg, #03101f, #07111f 60%, #020617);
      color: white;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--nami-blue), var(--nami-light-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      border: 2px solid rgba(255,255,255,.35);
      flex-shrink: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .error {
      color: #ffcccc;
      background: rgba(255, 0, 0, .15);
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 14px;
      display: none;
    }

    .cover {
      min-height: 155px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(0,94,184,.92), rgba(0,163,224,.75), rgba(122,193,67,.7));
      display: flex;
      align-items: flex-end;
      padding: 14px;
      margin-bottom: 14px;
    }

    .cover-badge {
      width: 100%;
      background: rgba(0,0,0,.45);
      padding: 10px 12px;
      border-radius: 16px;
    }

    .now-playing-label {
      color: var(--nami-green);
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #songTitle {
      font-size: 21px;
      font-weight: 800;
      margin-top: 4px;
      line-height: 1.15;
    }

    #songArtist {
      color: #e2e8f0;
      font-size: 14px;
      margin-top: 4px;
    }

    #player {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 200px;
      height: 200px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-wrap {
      width: 100%;
      height: 9px;
      background: rgba(255,255,255,.18);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--nami-green), var(--nami-light-blue));
      border-radius: 99px;
      transition: width .25s linear;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    button {
      min-height: 48px;
      border: none;
      border-radius: 16px;
      padding: 12px 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.12);
      touch-action: manipulation;
    }

    .play {
      background: linear-gradient(135deg, var(--nami-blue), var(--nami-light-blue));
      transform: scale(1.05);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .playlist {
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 10px;
      padding-bottom: 14px;
      flex: 1;              /* take remaining space */
      overflow-y: auto;     /* enable vertical scroll */
      min-height: 0;
    }

    .track {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      padding: 11px;
      border-radius: 17px;
      cursor: pointer;
    }

    .track.active {
      border-color: var(--nami-green);
      background: rgba(122,193,67,.16);
    }

    .track-number {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: rgba(0,163,224,.22);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--nami-light-blue);
      font-weight: bold;
    }

    .track-title {
      font-weight: bold;
      font-size: 14px;
      line-height: 1.2;
    }

    .track-artist {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .track-time {
      color: var(--muted);
      font-size: 12px;
    }

    .footer {
      margin-top: auto;
      padding-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .footer strong {
      color: var(--nami-green);
    }

    @media (max-width: 380px) {
      .app {
        padding: 12px;
      }

      .cover {
        min-height: 135px;
      }

      button {
        min-height: 44px;
        font-size: 16px;
      }

      .track {
        grid-template-columns: 34px 1fr;
      }

      .track-time {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="brand">
      <div class="logo">NAMI</div>
      <div>
        <h1>NAMI Broward</h1>
        <p>Tonight’s wellness playlist</p>
      </div>
    </div>

    <div id="errorBox" class="error"></div>

    <div class="cover">
      <div class="cover-badge">
        <div class="now-playing-label">Now Playing</div>
        <div id="songTitle">Loading songs...</div>
        <div id="songArtist">Please wait</div>
      </div>
    </div>

    <div id="player"></div>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="progress-wrap">
      <div id="progressBar"></div>
    </div>

    <div class="controls">
      <button onclick="previousSong()">⏮</button>
      <button onclick="stopSong()">⏹</button>
      <button class="play" onclick="playSong()">▶</button>
      <button onclick="pauseSong()">⏸</button>
      <button onclick="nextSong()">⏭</button>
    </div>

    <div class="section-title">
      <span>Choose a Song</span>
      <span id="songCount">0 songs</span>
    </div>

    <div class="playlist" id="playlist"></div>

    <div class="footer">
      <strong>You are not alone.</strong><br>
      Thank you for supporting mental health awareness with NAMI Broward County.
    </div>
  </div>

  <script>
    let player;
    let currentIndex = 0;
    let songs = [];
    let progressTimer;

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      loadSongsFromSheet();
    }

    function loadSongsFromSheet() {
      google.script.run
        .withSuccessHandler(function(data) {
          songs = data;

          if (!songs || songs.length === 0) {
            showError("No songs found. Check your Google Sheet rows.");
            return;
          }

          initializePlayer();
        })
        .withFailureHandler(function(error) {
          showError("Could not load songs: " + error.message);
        })
        .getSongs();
    }

    function initializePlayer() {
      player = new YT.Player("player", {
        height: "200",
        width: "200",
        videoId: songs[currentIndex].videoId,
        playerVars: {
          controls: 0,
          disablekb: 1,
          playsinline: 1,
          rel: 0
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerReady() {
      renderPlaylist();
      updateNowPlaying();
      startProgressTimer();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        nextSong();
      }
    }

    function renderPlaylist() {
      const playlist = document.getElementById("playlist");
      const songCount = document.getElementById("songCount");

      playlist.innerHTML = "";
      songCount.textContent = songs.length + " songs";

      songs.forEach((song, index) => {
        const track = document.createElement("div");
        track.className = "track" + (index === currentIndex ? " active" : "");
        track.onclick = () => selectSong(index);

        track.innerHTML = `
          <div class="track-number">${index + 1}</div>
          <div>
            <div class="track-title">${song.title}</div>
            <div class="track-artist">${song.artist}</div>
          </div>
          <div class="track-time">${song.displayTime}</div>
        `;

        playlist.appendChild(track);
      });
    }

    function updateNowPlaying() {
      document.getElementById("songTitle").textContent = songs[currentIndex].title;
      document.getElementById("songArtist").textContent = songs[currentIndex].artist;
      renderPlaylist();
    }

    function selectSong(index) {
      currentIndex = index;
      player.loadVideoById(songs[currentIndex].videoId);
      updateNowPlaying();
      playSong();
    }

    function playSong() {
      if (player) player.playVideo();
    }

    function pauseSong() {
      if (player) player.pauseVideo();
    }

    function stopSong() {
      if (player) {
        player.stopVideo();
        resetProgress();
      }
    }

    function nextSong() {
      currentIndex = (currentIndex + 1) % songs.length;
      player.loadVideoById(songs[currentIndex].videoId);
      updateNowPlaying();
      playSong();
    }

    function previousSong() {
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      player.loadVideoById(songs[currentIndex].videoId);
      updateNowPlaying();
      playSong();
    }

    function startProgressTimer() {
      progressTimer = setInterval(updateProgress, 500);
    }

    function updateProgress() {
      if (!player || typeof player.getCurrentTime !== "function") return;

      const current = player.getCurrentTime() || 0;
      const duration = player.getDuration() || 0;

      document.getElementById("currentTime").textContent = formatTime(current);
      document.getElementById("duration").textContent = duration ? formatTime(duration) : songs[currentIndex].displayTime;

      if (duration > 0) {
        const percent = (current / duration) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
      }
    }

    function resetProgress() {
      document.getElementById("currentTime").textContent = "0:00";
      document.getElementById("progressBar").style.width = "0%";
    }

    function formatTime(seconds) {
      seconds = Math.floor(seconds);
      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = seconds % 60;
      return minutes + ":" + (remainingSeconds < 10 ? "0" : "") + remainingSeconds;
    }

    function showError(message) {
      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "block";
      errorBox.textContent = message;
      document.getElementById("songTitle").textContent = "Playlist unavailable";
      document.getElementById("songArtist").textContent = "Check your setup";
    }
  </script>
</body>
</html>
